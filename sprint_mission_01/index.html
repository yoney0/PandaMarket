<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./reset.css">
  <link rel="stylesheet" href="./style.css">
  <link rel="icon" type="image/png" href="./images/icon.png">
  <title>판다마켓</title>
</head>
<body>
  <header id="header">
    <div class="header-inner">
      <a href="#">
      <div class="headerContainer">
        <img src="./images/판다 얼굴.png" alt="Logo" class="logo"></img>
      <div class="PandaMarket">판다마켓</div>
      </div></a>
      <a href="./login.html" target="_blank"><div class="login">로그인</div></a>
    </div>
  </header>


  <main>
    <div id="main-banner-top">
      <div class="banner-top">
        <div class="banner-container">
          <div class="banner-slogan-top">
            일상의 모든 물건을<br>거래해 보세요
          </div>
          <a href="./shop.html" target="_blank"><div class="banner-button">구경하러 가기</div></a>
        </div>
        <img class="banner-img-top" src="./images/Img_home_top.png" alt="cute fanda">
      </div>
    </div>

    <div id="main-text">
      <div class="grid01">
        <img class="grid-img" src="./images/Img_home_01.png" alt="shopping">
        <div class="grid01-textbox">
          <div class="grid-keyword">
            Hot item
          </div>
          <div class="grid-slogan">
            인기 상품을<br>확인해 보세요
          </div>
          <div class="grid-explane">
            가장 HOT한 중고거래 물품을<br>판다 마켓에서 확인해 보세요
          </div>
        </div>
      </div>
      <div class="grid02">
        <img class="grid-img" src="./images/Img_home_02.png" alt="shopping">
        <div class="grid02-textbox">
          <div class="grid-keyword">
            Search
          </div>
          <div class="grid-slogan">
            구매를 원하는<br>삼품을 검색하세요
          </div>
          <div class="grid-explane">
            구매하고 싶은 물품을 검색해서<br>쉽게 찾아보세요
          </div>
        </div>
      </div>
      <div class="grid03">
        <img class="grid-img" src="./images/Group 33682.png" alt="sale">
        <div class="grid03-textbox">
          <div class="grid-keyword">
            Register
          </div>
          <div class="grid-slogan">
            판매를 원하는<br>상품을 등록하세요
          </div>
          <div class="grid-explane">
            어떤 물건이든 판매하고 싶은 상품을<br>쉽게 등록하세요
          </div>
        </div>
      </div>
    </div>

    <div>
      <div class="box"></div>
      <div id="main-banner-bottom">
        <div class="banner-bottom">
          <div class="banner-slogan-bottom">
            믿을 수 있는<br>판다마켓 중고 거래
          </div>
          <img class="banner-img-bottom" src="./images/Img_home_bottom.png" alt="cute fanda">
        </div>
      </div>
    </div>
  </main>
  <footer id="footer">
    <div class="footer-inner">
      <div class="copy">©codeit - 2026</div>
      <div class="help-container">
        <a href="./policy.html" target="_blank"><div class="help">Privacy Policy</div></a>
        <a href="./faq.html" target="_blank"><div class="help">FAQ</div></a>
      </div>
      <div class="sns-container">
        <a href="https://www.facebook.com/" target="_blank"><img class="sns" src="./images/ic_facebook.png"></a>
        <a href="https://x.com/" target="_blank"><img class="sns" src="./images/ic_twitter.png"></a>
        <a href="https://www.youtube.com/" target="_blank"><img class="sns" src="./images/ic_youtube.png"></a>
        <a href="https://www.instagram.com/" target="_blank"><img class="sns" src="./images/ic_instagram.png"></a>
        
      </div>
    </div>
  </footer>
</body>
</html>
