<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="./images/icon.png">
  <title>판다마켓 로그인</title>
</head>
<body>
  <header id="login-header">
    <a href="./index.html">
      <div class="login-logo">
        <img src="./images/판다 얼굴.png" alt="Logo" class="login-img"></img>
        <div class="login-PandaMarket">판다마켓</div>
      </div>
    </a>
  </header>
    <div id="login-box">
      <form class="login-form">
        <div class="login-grid01">
          <div class="login-text">이메일</div>
            <input type="email" id="user-id" placeholder="이메일을 입력해주세요" required>
        </div>
        <div class="login-grid02">
          <div class="login-text">비밀번호</div>
            <div class="login-passward">
              <input type="password" id="user-passward" placeholder="비밀번호를 입력해주세요" required>
              <button type="button" class="visibility-button">
                <img src="./images/btn_visibility_on_24px.png" alt="비밀번호 보기">
              </button>
            </div>
        </div>
        <div class="login-grid03">
          <button type="submit" class="login-btn">로그인</button>
        </div>
      </form>
      
      
      <div class="login-grid04">
        <div class="grid04-container">
          <div class="simple-login">간편 로그인하기</div>
          <div class="login-sns">
            <a href="https://www.google.com/" target="_blank"> <img src="./images/Component 2@3x.png" alt="구글"></a>
            <a href="https://www.kakao.com/" target="_blank"><img src="./images/Component 3@3x.png" alt="카카오"></a>
          </div>
        </div>
      </div>
      
      <div class="login-grid05">
        <div class="login-signup">판다마켓이 처음이신가요? <a href="./signup.html">회원가입</a></div>
      </div>
    </div>
</body>
</html>
